# ══════════════════════════════════════════════════════════════════════
#  Profile: docker
#  Dùng khi chạy trong container. Các giá trị đọc từ biến môi trường
#  (được set trong docker-compose.yml).
#  Spring tự động đọc file này khi SPRING_PROFILES_ACTIVE=docker
# ══════════════════════════════════════════════════════════════════════

# Database — host "mysql" là tên service trong docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/e0bmanager_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Mail
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=8080
